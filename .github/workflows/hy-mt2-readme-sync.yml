# Managed by hy-mt2-github-translator. Regenerate translations when the source README changes.
name: hy-mt2 README sync
on:
  push:
    branches:
      - main
    paths:
      - README.md
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: hy-mt2-readme-sync
  cancel-in-progress: true
jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Translate READMEs
        env:
          TENCENT_HUNYUAN_API_KEY: ${{ secrets.TENCENT_HUNYUAN_API_KEY }}
        run: node .github/hy-mt2/translate-readmes.mjs
      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: sync translated READMEs'
          branch: hy-mt2/readme-sync
          delete-branch: true
          title: 'Sync translated READMEs'
          body: |
            Automated translation refresh triggered by a change to the source README.

            Generated by [hy-mt2-github-translator](https://github.com/Tencent-Hunyuan/Hy-MT2) using Tencent Hunyuan MT (HY MT2).
            Review the machine translation before merging; close this PR safely if it is not needed.
