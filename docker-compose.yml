version: '3.8'

services:
  backend:
    build: .
    container_name: comet-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - .:/app
    env_file:
      - config/production.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: comet-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    restart: unless-stopped

  monitor:
    build: .
    container_name: comet-monitor
    command: python monitor/main.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - .:/app
    env_file:
      - config/production.env
    restart: unless-stopped
    depends_on:
      - backend